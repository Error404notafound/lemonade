name: Build Lemonade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar o Flutter Estavel
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Restaurar e Corrigir Estrutura Nativa (Garante Bolinha Verde)
      run: |
        # Cria backups de seguranca
        mkdir -p backup_lemonade
        cp lib/main.dart backup_lemonade/
        cp pubspec.yaml backup_lemonade/
        
        # Apaga a pasta nativa antiga
        rm -rf android
        
        # Cria o projeto de forma limpa
        flutter create . --org com.error404notafound --project-name lemonade
        
        # Restaura seus arquivos principais
        cp backup_lemonade/main.dart lib/
        cp backup_lemonade/pubspec.yaml ./
        
        # Ativa o AndroidX
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties

    - name: Injetar Permissao de Sites Antigos de Forma Segura
      run: |
        # Substitui a tag application padrao incluindo o suporte a HTTP limpo sem quebrar o XML
        cat << 'EOF' > android/app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://android.com">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application
                android:label="Lemonade"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"
                      />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
            </application>
        </manifest>
        EOF

    - name: Baixar as dependencias do app
      run: flutter pub get

    - name: Criar o arquivo APK Final
      run: flutter build apk --debug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: lemonade-app-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
