name: Build Lemonade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar o Flutter Estavel
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Restaurar e Corrigir Estrutura Nativa (Garante Bolinha Verde)
      run: |
        mkdir -p backup_lemonade
        cp lib/main.dart backup_lemonade/
        cp pubspec.yaml backup_lemonade/
        
        rm -rf android
        flutter create . --org com.error404notafound --project-name lemonade
        
        cp backup_lemonade/main.dart lib/
        cp backup_lemonade/pubspec.yaml ./
        
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties

    - name: Baixar a Imagem do Limao e Configurar Pastas
      run: |
        mkdir -p assets/icon
        # Baixa a foto direto do link que você enviou
        curl -L "https://image.cdn2.seaart.me/2026-05-19/d85uilte878c73f6v4f0/982a163c-9dfe-4dde-9246-3604087cd159.png" -o assets/icon/logo.png

    - name: Corrigir Conflito de Kotlin, Android 5.0+ e Permissoes via Python
      run: |
        python3 -c "
        build_gradle_path = 'android/app/build.gradle'
        with open(build_gradle_path, 'r') as f:
            bg_content = f.read()
        bg_content = bg_content.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 21')
        
        kotlin_fix = '''
        configurations.all {
            resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion '1.8.22'
                }
            }
        }
        '''
        bg_content = bg_content + '\n' + kotlin_fix
        
        with open(build_gradle_path, 'w') as f:
            f.write(bg_content)

        manifest_path = 'android/app/src/main/AndroidManifest.xml'
        with open(manifest_path, 'r') as f:
            m_content = f.read()
        if 'android:usesCleartextTraffic' not in m_content:
            m_content = m_content.replace('<application', '<application android:usesCleartextTraffic=\"true\"')
        with open(manifest_path, 'w') as f:
            f.write(m_content)
        "

    - name: Baixar as dependencias do app
      run: flutter pub get

    - name: Gerar os Icones Customizados com o Limao
      run: flutter pub run flutter_launcher_icons

    - name: Criar o arquivo APK Final
      run: flutter build apk --debug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: lemonade-app-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
