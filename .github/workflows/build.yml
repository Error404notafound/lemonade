name: Build Lemonade APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar o Flutter Estavel
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Restaurar e Corrigir Estrutura Nativa (Garante Bolinha Verde)
      run: |
        # Cria backups de seguranca
        mkdir -p backup_lemonade
        cp lib/main.dart backup_lemonade/
        cp pubspec.yaml backup_lemonade/
        
        # Apaga a pasta nativa antiga antiga
        rm -rf android
        
        # Cria o projeto de forma limpa e perfeita usando o proprio Flutter
        flutter create . --org com.error404notafound --project-name lemonade
        
        # Restaura seus arquivos principais intactos
        cp backup_lemonade/main.dart lib/
        cp backup_lemonade/pubspec.yaml ./
        
        # Ativa o AndroidX
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties

    - name: Injetar Permissao de Sites Antigos via Script Seguro
      run: |
        # Usamos Python para modificar o XML original criado pelo Flutter sem corromper nenhuma tag
        python3 -c "
        path = 'android/app/src/main/AndroidManifest.xml'
        with open(path, 'r') as f:
            content = f.read()
        
        # Injeta a regra que aceita sites HTTP sem destruir os atributos nativos
        if 'android:usesCleartextTraffic' not in content:
            content = content.replace('<application', '<application android:usesCleartextTraffic=\"true\"')
            
        with open(path, 'w') as f:
            f.write(content)
        "

    - name: Baixar as dependencias do app
      run: flutter pub get

    - name: Criar o arquivo APK Final
      run: flutter build apk --debug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: lemonade-app-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
